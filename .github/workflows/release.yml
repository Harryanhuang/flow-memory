name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/flow-memory
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          test "v${PACKAGE_VERSION}" = "${GITHUB_REF_NAME}"

      - name: Build distribution
        run: |
          python -m build

      - name: Verify built artifacts
        run: |
          ls -la dist/
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Flow Memory ${{ github.ref_name }}
          body: |
            See [CHANGELOG.md](https://github.com/Harryanhuang/flow-memory/blob/main/CHANGELOG.md) for details.

            ## Installation

            ```bash
            pip install flow-memory
            ```

            ## Or with extras

            ```bash
            pip install flow-memory[mcp]       # MCP server support
            pip install flow-memory[vector]    # LanceDB vector search
            pip install flow-memory[postgres]  # Postgres backend
            pip install flow-memory[all]       # Everything
            ```
          draft: false
          prerelease: false
